plugins {
    id 'java'
}

group = 'run.halo.ui.beautify'
version = '1.1.8'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
    maven { url 'https://s01.oss.sonatype.org/content/repositories/releases' }
    maven { url 'https://s01.oss.sonatype.org/content/repositories/snapshots/' }
}

dependencies {
    compileOnly 'run.halo.app:api:2.22.0'
    compileOnly 'org.springframework.boot:spring-boot-starter-webflux:3.4.3'
    compileOnly 'org.thymeleaf:thymeleaf:3.1.3.RELEASE'
}

jar {
    manifest {
        attributes 'Plugin-Id': 'plugin-ui-beautify',
                   'Plugin-Version': version
    }
}
