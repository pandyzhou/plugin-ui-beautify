apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  name: plugin-ui-beautify
spec:
  enabled: true
  version: "1.8.2"
  requires: ">=2.22.0"
  author:
    name: 周易
  logo: logo.png
  homepage: "https://github.com/pandyzhou/plugin-ui-beautify"
  repo: "https://github.com/pandyzhou/plugin-ui-beautify"
  issues: "https://github.com/pandyzhou/plugin-ui-beautify/issues"
  displayName: "后台美化插件"
  description: "为 Halo 后台 Console 和网关页面（登录/注册等）提供现代化的界面美化，支持多种风格切换、动态装饰效果和自定义 CSS"
  license:
    - name: "MIT"
  settingName: "plugin-ui-beautify-settings"
  configMapName: "plugin-ui-beautify-configmap"
