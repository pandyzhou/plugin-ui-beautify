apiVersion: plugin.halo.run/v1alpha1
kind: Setting
metadata:
  name: plugin-ui-beautify-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: select
          label: "Console 风格"
          name: consoleTheme
          value: "default"
          help: "选择后台管理界面的视觉风格"
          options:
            - label: "🌿 默认 — 薄荷清新"
              value: "default"
            - label: "🌊 深邃蓝 — 专业冷静"
              value: "ocean"
            - label: "🌙 暗夜 — 深色护眼"
              value: "dark"
            - label: "🌸 樱花 — 温暖柔和"
              value: "sakura"
            - label: "◻️ 极简 — 纯净无饰"
              value: "minimal"
            - label: "🌌 极光 — 紫粉科技"
              value: "aurora"
            - label: "🖥️ 跟随系统 — 自动切换明暗"
              value: "auto"
        - $formkit: checkbox
          label: "启用动态装饰"
          name: enableEffects
          value: true
          help: "开启后各主题会显示专属动态效果（樱花飘落、星空闪烁、气泡上浮等）"
        - $formkit: checkbox
          label: "启用网关页面美化"
          name: enableGateway
          value: true
          help: "关闭后登录、注册等网关页面不会注入美化样式，避免与前台主题冲突"
        - $formkit: select
          label: "网关页面风格"
          name: gatewayTheme
          value: "default"
          help: "登录、注册等网关页面的视觉风格（需开启网关页面美化）"
          options:
            - label: "🌿 默认 — 薄荷清新"
              value: "default"
            - label: "🌊 深邃蓝 — 专业冷静"
              value: "ocean"
            - label: "🌙 暗夜 — 深色护眼"
              value: "dark"
            - label: "🌸 樱花 — 温暖柔和"
              value: "sakura"
            - label: "◻️ 极简 — 纯净无饰"
              value: "minimal"
            - label: "🌌 极光 — 紫粉科技"
              value: "aurora"
        - $formkit: textarea
          label: "自定义 CSS"
          name: customCss
          value: ""
          help: "输入自定义 CSS 代码，会追加到 Console 页面中（高级用户使用）"
          rows: 6
